# Render Blueprint — https://render.com/docs/blueprint-spec
# After connect: set secret env var values in the Render dashboard (from your local .env).

services:
  - type: web
    name: resume-rocket
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: node .output/server/index.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NUXT_PUBLIC_SITE_URL
        sync: false
      - key: NUXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NUXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
